version: '3.8'

services:
  # Backend API server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dealer-backend
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - ./backend/dealer.db:/app/dealer.db
      - backend-logs:/app/logs
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - ENVIRONMENT=production
    networks:
      - dealer-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx reverse proxy (serves Flutter Web + proxies API)
  nginx:
    image: nginx:alpine
    container_name: dealer-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./HACKATON/build/web:/var/www/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - dealer-network

volumes:
  backend-logs:
    driver: local

networks:
  dealer-network:
    driver: bridge
